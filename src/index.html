<!DOCTYPE html>
<html>
  <head>
    <title>Parcel Sandbox</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <div id="app">
      <canvas id="webgl" width="500" height="500"></canvas>

      <div id="ui">
        <div class="row">
          <label
            >Global rotation
            <input id="globalRot" type="range" min="-180" max="180" value="0" />
          </label>
          <span id="globalRotVal">0</span>
        </div>

        <div class="row">
          <label
            >Front leg shoulder
            <input
              id="frontShoulder"
              type="range"
              min="-90"
              max="90"
              value="15"
            />
          </label>
          <span id="frontShoulderVal">15</span>
        </div>

        <div class="row">
          <label
            >Front leg knee
            <input id="frontKnee" type="range" min="-120" max="30" value="-25" />
          </label>
          <span id="frontKneeVal">-25</span>
        </div>

        <div class="row">
          <label
            >Front leg ankle
            <input id="frontAnkle" type="range" min="-60" max="60" value="10" />
          </label>
          <span id="frontAnkleVal">10</span>
        </div>

        <div class="row">
          <button id="toggleAnim">Animation: OFF</button>
          <span id="fps">FPS: --</span>
        </div>
      </div>
    </div>

    <script src="src/index.js"></script>
  </body>
</html>
